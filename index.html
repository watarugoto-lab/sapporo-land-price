<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>札幌市 沿線別 坪単価マップ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;background:#0d0f1a;color:#e0e0ec;height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column}

header{flex-shrink:0;height:52px;padding:0 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #1e2035;background:#10121e}
h1{font-size:1.15rem;font-weight:700;letter-spacing:.03em;white-space:nowrap}
.subtitle{font-size:.72rem;color:#5a5a7a;margin-top:2px}

.main{display:flex;flex:1;min-height:0}

/* ── 左ペイン ─────── */
.left{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}

.vtabs{display:flex;background:#10121e;border-bottom:1px solid #1e2035}
.vtab{padding:9px 22px;font-size:.8rem;cursor:pointer;color:#666;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;user-select:none}
.vtab.active{color:#c8c8e8;border-bottom-color:#4a7cc9}

/* Map */
.canvas-wrap{flex:1;position:relative;background:#11132060 linear-gradient(135deg,#0d0f1a 0%,#111328 100%);display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas{display:block;cursor:grab;max-width:100%;max-height:100%;touch-action:none}
canvas:active{cursor:grabbing}

.map-ctrl{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:5px}
.map-ctrl button{width:34px;height:34px;background:#1c1e2e;border:1px solid #2e3050;color:#c0c0d8;font-size:1rem;cursor:pointer;border-radius:5px;transition:background .12s}
.map-ctrl button:hover{background:#2a2c40}
.map-ctrl button.small{font-size:.6rem;height:28px}

/* Chart */
.chart-area{flex:1;display:none;flex-direction:column;overflow:hidden}
.line-tabs{display:flex;background:#10121e;border-bottom:1px solid #1e2035;flex-shrink:0}
.ltab{padding:9px 18px;font-size:.78rem;cursor:pointer;color:#666;border-left:3px solid transparent;transition:background .12s,color .12s;user-select:none}
.ltab.active{color:#e0e0ec;background:#13152280}
.chart-inner{flex:1;position:relative;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
#chart{display:block}

/* ── 右サイドバー ─── */
.sidebar{width:270px;border-left:1px solid #1e2035;padding:18px;display:flex;flex-direction:column;gap:20px;overflow-y:auto;background:#0e1020;flex-shrink:0}

.sec-label{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#4a4a6a;margin-bottom:8px}

/* Budget */
.budget-val{font-size:1.5rem;font-weight:800;color:#d0d0f0;line-height:1}
.budget-hint{font-size:.68rem;color:#444466;margin-top:5px}
input[type=range]{width:100%;-webkit-appearance:none;height:3px;background:#252638;border-radius:2px;outline:none;margin-top:8px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#4a7cc9;cursor:pointer;box-shadow:0 0 0 3px #4a7cc920}

/* Detail */
.detail{display:none;border-radius:8px;padding:15px;border:1px solid #1e2035;background:#13152a;position:relative}
.detail.show{display:block}
.detail-close{position:absolute;top:8px;right:10px;color:#444;cursor:pointer;font-size:1rem;line-height:1}
.detail-close:hover{color:#999}
.detail-name{font-size:1rem;font-weight:700;margin-bottom:2px}
.detail-line{font-size:.7rem;color:#5a5a7a;margin-bottom:10px}
.detail-price{font-size:2rem;font-weight:800;line-height:1}
.detail-unit{font-size:.85rem;font-weight:400;color:#8888aa}
.detail-range{font-size:.72rem;color:#5a5a7a;margin-top:4px}

/* Legend */
.legend{display:flex;flex-direction:column;gap:7px}
.legend-row{display:flex;align-items:center;gap:9px;font-size:.75rem;color:#8888aa}
.legend-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.legend-bar{width:26px;height:4px;border-radius:2px;flex-shrink:0}

.note{font-size:.65rem;color:#333350;line-height:1.7;padding-top:4px;border-top:1px solid #1a1c30}

/* Responsive */
@media(max-width:900px) and (min-width:701px){
  .sidebar{width:220px;padding:14px;gap:16px}
  .detail-price{font-size:1.5rem}
}

/* ── スマートフォン（縦積み） ── */
@media(max-width:700px){
  header{height:auto;padding:9px 14px}
  h1{font-size:1rem;white-space:normal;line-height:1.25}
  .subtitle{font-size:.62rem}

  /* 地図/チャートを上に大きく、操作パネルを下に */
  .main{flex-direction:column}
  .left{flex:1;min-height:0}

  .sidebar{width:100%;border-left:none;border-top:1px solid #1e2035;
    padding:12px 14px 14px;gap:13px;max-height:36vh}

  /* 凡例・路線を横並びでコンパクトに */
  .legend{flex-direction:row;flex-wrap:wrap;gap:7px 14px}
  .legend-row{font-size:.72rem}
  .budget-val{font-size:1.25rem}

  /* タッチしやすい操作ボタン */
  .map-ctrl button{width:40px;height:40px;font-size:1.15rem}
  .map-ctrl button.small{height:32px;font-size:.62rem}
  .vtab{padding:11px 20px;font-size:.82rem}

  /* 駅タップ時の詳細は下からせり出すパネルに */
  .detail.show{position:fixed;left:0;right:0;bottom:0;z-index:50;
    border-radius:16px 16px 0 0;border-bottom:none;padding:18px 18px 24px;
    box-shadow:0 -10px 34px rgba(0,0,0,.55)}
  .detail-close{top:12px;right:16px;font-size:1.5rem;padding:4px}
  .detail-price{font-size:2rem}
}
</style>
</head>

<header>
  <div>
    <h1>札幌市 沿線別 坪単価マップ</h1>
    <div class="subtitle">市営地下鉄 南北線・東西線・東豊線 ／ 令和8年（2026年）地価公示ベース</div>
  </div>
</header>

<div class="main">
  <div class="left">
    <div class="vtabs">
      <div class="vtab active" id="vMap">マップ</div>
      <div class="vtab" id="vChart">路線チャート</div>
    </div>

    <!-- Map view -->
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="map" width="760" height="520"></canvas>
      <div class="map-ctrl">
        <button id="zIn" title="拡大">＋</button>
        <button id="zOut" title="縮小">－</button>
        <button id="zReset" class="small" title="初期表示">全体</button>
      </div>
    </div>

    <!-- Chart view -->
    <div class="chart-area" id="chartArea">
      <div class="line-tabs" id="lineTabs"></div>
      <div class="chart-inner">
        <svg id="chart"></svg>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Budget slider -->
    <div>
      <div class="sec-label">予算フィルター</div>
      <div class="budget-val" id="bLabel">制限なし</div>
      <input type="range" id="bSlider" min="15" max="1500" step="10" value="1500">
      <div class="budget-hint">上限坪単価でマップを絞り込み</div>
    </div>

    <!-- Station detail -->
    <div class="detail" id="detail">
      <div class="detail-close" id="detailClose">✕</div>
      <div class="detail-name" id="dName"></div>
      <div class="detail-line" id="dLine"></div>
      <div><span class="detail-price" id="dPrice"></span><span class="detail-unit"> 万円/坪</span></div>
      <div class="detail-range" id="dRange"></div>
    </div>

    <!-- Price tier legend -->
    <div>
      <div class="sec-label">価格帯</div>
      <div class="legend">
        <div class="legend-row"><div class="legend-dot" style="background:#9B1B1B"></div>400万円以上（都心商業地）</div>
        <div class="legend-row"><div class="legend-dot" style="background:#CC5500"></div>150〜400万円/坪</div>
        <div class="legend-row"><div class="legend-dot" style="background:#B08800"></div>80〜150万円/坪</div>
        <div class="legend-row"><div class="legend-dot" style="background:#2D7D46"></div>50〜80万円/坪</div>
        <div class="legend-row"><div class="legend-dot" style="background:#1B6598"></div>50万円以下</div>
      </div>
    </div>

    <!-- Line legend -->
    <div>
      <div class="sec-label">路線</div>
      <div class="legend" id="lineLegend"></div>
    </div>

    <div class="note">
      ※ 坪単価は国土交通省地価公示（令和8年1月1日時点）を基に算出。<br>
      実際の取引価格は駅からの距離・用途地域・物件条件等により変動します。<br>
      目安参考値としてご利用ください。
    </div>
  </div>
</div>

// ─── Canvas 定数 ─────────────────────────────────────────────────────────────
// CW/CH は実際の表示サイズに合わせて動的に更新する（スマホ対応）
let CW = 760, CH = 520;
const BSX = 4200, BSY = 4800;
const INIT = { cx: 141.360, cy: 43.049, zoom: 1.0 };

let view = { ...INIT };
let budget = 1500;
let curLine = LINES[0];
let curViewMode = 'map';
let selSt = null;  // { stName, lineId }

const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');

// Canvasを表示領域いっぱいにフィットさせ、高解像度（Retina）対応で描画する
function resizeCanvas() {
  const wrap = document.getElementById('canvasWrap');
  const cssW = wrap.clientWidth, cssH = wrap.clientHeight;
  if (!cssW || !cssH) return;
  const dpr = window.devicePixelRatio || 1;
  CW = cssW; CH = cssH;                       // 論理サイズ（CSSピクセル）
  canvas.width = Math.round(cssW * dpr);      // 実ピクセル（くっきり描画用）
  canvas.height = Math.round(cssH * dpr);
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);     // 以降はCSSピクセル単位で描ける
}

// 初期表示：画面幅に応じてズームを調整し、PC版と同じ範囲が見えるようにする
function setInitialView() {
  view = { cx: INIT.cx, cy: INIT.cy, zoom: INIT.zoom * (CW / 760) };
}

// 座標変換
function g2c(lon, lat) {
  return {
    x: CW / 2 + (lon - view.cx) * BSX * view.zoom,
    y: CH / 2 - (lat - view.cy) * BSY * view.zoom
  };
}
function c2g(x, y) {
  return {
    lon: view.cx + (x - CW / 2) / (BSX * view.zoom),
    lat: view.cy - (y - CH / 2) / (BSY * view.zoom)
  };
}

// 価格 → 色
function pc(p) {
  return p >= 400 ? '#9B1B1B'
       : p >= 150 ? '#CC5500'
       : p >= 80  ? '#B08800'
       : p >= 50  ? '#2D7D46'
       :             '#1B6598';
}

// ─── マップ描画 ─────────────────────────────────────────────────────────────
// 主要駅（常にラベル表示）
const MAJOR = new Set(['大通','さっぽろ','すすきの','琴似','円山公園','新さっぽろ','麻生','栄町','福住','真駒内','豊水すすきの']);

function drawMap() {
  ctx.clearRect(0, 0, CW, CH);

  // ── 区ポリゴン（塗り＋区界線） ──
  WARDS.forEach(w => {
    ctx.beginPath();
    w.poly.forEach((pt, i) => {
      const p = g2c(pt[0], pt[1]);
      i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();
    ctx.fillStyle = WARD_TINT[w.name] || 'rgba(255,255,255,0.04)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(120,140,200,0.28)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // ── 豊平川 ──
  ctx.beginPath();
  TOYOHIRA.forEach((pt, i) => {
    const p = g2c(pt[0], pt[1]);
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  });
  ctx.strokeStyle = 'rgba(70,130,200,0.5)';
  ctx.lineWidth = Math.max(2.5, 3.5 * Math.min(view.zoom, 2));
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.lineWidth = 1;

  // ── 区名ラベル ──
  ctx.font = `${view.zoom >= 1.6 ? 14 : 12}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(150,150,185,0.55)';
  WARDS.forEach(w => {
    const c = WARD_LABEL[w.name];
    if (!c) return;
    const p = g2c(c[0], c[1]);
    if (p.x < -30 || p.x > CW + 30 || p.y < -20 || p.y > CH + 20) return;
    ctx.fillText(w.name, p.x, p.y);
  });

  LINES.forEach(line => {
    const gst = line.st.filter(s => s.g);

    // 路線ライン（薄く全体）
    if (gst.length >= 2) {
      ctx.beginPath();
      gst.forEach((s, i) => {
        const p = g2c(s.g[0], s.g[1]);
        i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
      });
      ctx.strokeStyle = line.color + '40';
      ctx.lineWidth = 4;
      ctx.stroke();

      // 予算内の区間を強調
      ctx.lineWidth = 4;
      ctx.strokeStyle = line.color + 'cc';
      let seg = false;
      ctx.beginPath();
      gst.forEach(s => {
        if (s.p > budget) { seg = false; return; }
        const p = g2c(s.g[0], s.g[1]);
        if (!seg) { ctx.moveTo(p.x, p.y); seg = true; }
        else ctx.lineTo(p.x, p.y);
      });
      ctx.stroke();
    }

    // 駅ドット
    gst.forEach(s => {
      const p = g2c(s.g[0], s.g[1]);
      const inBudget = s.p <= budget;
      const col = pc(s.p);
      const r = view.zoom >= 1.8 ? 7 : 5;

      // 選択リング
      const isSel = selSt && selSt.stName === s.n && selSt.lineId === line.id;
      if (isSel) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, r + 5, 0, Math.PI * 2);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // 外枠
      ctx.beginPath();
      ctx.arc(p.x, p.y, r + 1.5, 0, Math.PI * 2);
      ctx.fillStyle = '#0d0f1a';
      ctx.fill();

      // 本体
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fillStyle = inBudget ? col : col + '33';
      ctx.fill();
    });

    // ラベル（ズーム大 or 主要駅）
    gst.forEach(s => {
      if (!s.g) return;
      const inBudget = s.p <= budget;
      if (!inBudget) return;
      const showLabel = view.zoom >= 1.8 || MAJOR.has(s.n) || s.p >= 200;
      if (!showLabel) return;

      const p = g2c(s.g[0], s.g[1]);
      const r = view.zoom >= 1.8 ? 7 : 5;
      const fs = view.zoom >= 1.8 ? 11 : 10;

      ctx.font = `${fs}px sans-serif`;
      ctx.textAlign = 'center';

      // テキスト背景
      const tw = ctx.measureText(s.n).width;
      ctx.fillStyle = 'rgba(13,15,26,0.7)';
      ctx.fillRect(p.x - tw / 2 - 2, p.y - r - fs - 4, tw + 4, fs + 2);

      ctx.fillStyle = inBudget ? '#e0e0f0' : '#555577';
      ctx.fillText(s.n, p.x, p.y - r - 5);
    });
  });
}

// ─── チャート ───────────────────────────────────────────────────────────────
function renderChart(line) {
  const svg = document.getElementById('chart');
  const inner = svg.parentElement;            // chart-inner
  const availW = inner.clientWidth;
  const availH = inner.clientHeight;
  if (availW < 50 || availH < 50) { setTimeout(() => renderChart(line), 50); return; }

  const isMobile = window.innerWidth <= 700;
  const sts = line.st.filter(s => s.p <= budget);

  // スマホでは1駅あたりの横幅を確保し、横スクロールで全駅を大きく読めるようにする
  const minStep = isMobile ? 52 : 0;
  const PAD = { t: isMobile ? 44 : 40, r: 20, b: isMobile ? 98 : 80, l: isMobile ? 58 : 65 };
  const W = Math.max(availW, PAD.l + PAD.r + Math.max(1, sts.length - 1) * minStep);
  const H = availH;
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.style.width = W + 'px';
  svg.style.height = H + 'px';

  // フォント・ドットサイズ（スマホは大きめ）
  const FS = {
    price: isMobile ? 15 : 10,
    name:  isMobile ? 13 : 10,
    tick:  isMobile ? 12 : 10,
    title: isMobile ? 14 : 12,
    axis:  isMobile ? 12 : 10
  };
  const DR = isMobile ? 6 : 5;

  if (sts.length < 2) {
    svg.innerHTML = `<text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#555577" font-size="14" font-family="sans-serif">表示できる駅がありません（予算を上げてください）</text>`;
    return;
  }

  const maxP = Math.max(...sts.map(s => s.p));
  const pTop = maxP * 1.18;
  const iW = W - PAD.l - PAD.r;
  const iH = H - PAD.t - PAD.b;
  const xStep = iW / (sts.length - 1);

  const pts = sts.map((s, i) => ({
    x: PAD.l + i * xStep,
    y: PAD.t + (1 - s.p / pTop) * iH,
    s
  }));

  // Catmull-Rom スプライン
  function catmullPath(ps) {
    let d = `M${ps[0].x.toFixed(1)},${ps[0].y.toFixed(1)}`;
    const T = 0.38;
    for (let i = 0; i < ps.length - 1; i++) {
      const p0 = ps[Math.max(0, i - 1)];
      const p1 = ps[i], p2 = ps[i + 1];
      const p3 = ps[Math.min(ps.length - 1, i + 2)];
      const cp1x = p1.x + (p2.x - p0.x) * T / 3;
      const cp1y = p1.y + (p2.y - p0.y) * T / 3;
      const cp2x = p2.x - (p3.x - p1.x) * T / 3;
      const cp2y = p2.y - (p3.y - p1.y) * T / 3;
      d += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
    }
    return d;
  }

  const pathD = catmullPath(pts);
  const fp = pts[0], lp = pts[pts.length - 1];
  const areaD = `${pathD} L${lp.x.toFixed(1)},${(PAD.t + iH).toFixed(1)} L${fp.x.toFixed(1)},${(PAD.t + iH).toFixed(1)} Z`;

  const [rr, gg, bb] = (line.color.match(/\w\w/g) || ['09','8c','3a']).map(x => parseInt(x, 16));

  // Y軸目盛り
  const tickVals = [];
  const nTick = 5;
  for (let i = 0; i <= nTick; i++) {
    const v = Math.round(pTop * i / nTick / 10) * 10;
    tickVals.push({ v, y: (PAD.t + (1 - v / pTop) * iH).toFixed(1) });
  }

  // 価格ラベルを表示する駅（駅間隔が十分なら全駅）
  const labelAll = xStep >= 30;

  svg.innerHTML = `
<defs>
  <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="rgb(${rr},${gg},${bb})" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="rgb(${rr},${gg},${bb})" stop-opacity="0.01"/>
  </linearGradient>
</defs>

<!-- グリッド & Y軸 -->
${tickVals.map(t => `
  <line x1="${PAD.l}" y1="${t.y}" x2="${(W - PAD.r).toFixed(0)}" y2="${t.y}" stroke="#1a1c30" stroke-width="1"/>
  <text x="${(PAD.l - 8).toFixed(0)}" y="${(+t.y + 4).toFixed(0)}" text-anchor="end" fill="#44446a" font-size="${FS.tick}" font-family="sans-serif">${t.v >= 1000 ? Math.round(t.v / 100) * 100 : t.v}万</text>
`).join('')}

<!-- エリア -->
<path d="${areaD}" fill="url(#ag)"/>

<!-- ライン -->
<path d="${pathD}" fill="none" stroke="${line.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

<!-- 駅ドット -->
${pts.map(pt => `
  <circle cx="${pt.x.toFixed(1)}" cy="${pt.y.toFixed(1)}" r="${DR}" fill="${pc(pt.s.p)}" stroke="#0d0f1a" stroke-width="1.5"/>
`).join('')}

<!-- 価格ラベル -->
${pts.filter(pt => labelAll || pt.s.p >= 100 || pt === pts[0] || pt === pts[pts.length - 1]).map(pt => `
  <text x="${pt.x.toFixed(1)}" y="${(pt.y - DR - 6).toFixed(1)}" text-anchor="middle" fill="#d8d8ec" font-size="${FS.price}" font-weight="700" font-family="sans-serif">${pt.s.p >= 1000 ? (pt.s.p / 100 | 0) + '百' : pt.s.p}</text>
`).join('')}

<!-- 駅名ラベル（斜め） -->
${pts.map((pt, i) => {
  const anchor = i === 0 ? 'end' : i === pts.length - 1 ? 'start' : 'end';
  const bx = pt.x.toFixed(1);
  const by = (PAD.t + iH + (isMobile ? 16 : 14)).toFixed(1);
  return `<text x="${bx}" y="${by}" text-anchor="${anchor}" fill="#9999bb" font-size="${FS.name}" font-family="sans-serif" transform="rotate(-42,${bx},${by})">${pt.s.n}</text>`;
}).join('')}

<!-- タイトル -->
<text x="${(PAD.l + iW / 2).toFixed(0)}" y="22" text-anchor="middle" fill="#b0b0cc" font-size="${FS.title}" font-weight="600" font-family="sans-serif">${line.full}（${line.dir}）</text>

<!-- Y軸タイトル -->
<text x="${(PAD.l - 46).toFixed(0)}" y="${(PAD.t + iH / 2).toFixed(0)}" text-anchor="middle" fill="#44446a" font-size="${FS.axis}" font-family="sans-serif" transform="rotate(-90,${(PAD.l - 46).toFixed(0)},${(PAD.t + iH / 2).toFixed(0)})">万円/坪</text>
`;
}

// ─── 路線タブ構築 ──────────────────────────────────────────────────────────
function buildLineTabs() {
  const el = document.getElementById('lineTabs');
  LINES.forEach(line => {
    const btn = document.createElement('div');
    btn.className = 'ltab' + (line === curLine ? ' active' : '');
    btn.textContent = line.name;
    btn.style.borderLeftColor = line === curLine ? line.color : 'transparent';
    btn.addEventListener('click', () => {
      curLine = line;
      document.querySelectorAll('.ltab').forEach(b => {
        b.classList.remove('active');
        b.style.borderLeftColor = 'transparent';
      });
      btn.classList.add('active');
      btn.style.borderLeftColor = line.color;
      renderChart(line);
      hideDetail();
    });
    el.appendChild(btn);
  });
}

function buildLineLegend() {
  document.getElementById('lineLegend').innerHTML = LINES.map(l =>
    `<div class="legend-row"><div class="legend-bar" style="background:${l.color}"></div><span>${l.name}（${l.dir}）</span></div>`
  ).join('');
}

// ─── 詳細パネル ────────────────────────────────────────────────────────────
function showDetail(st, line) {
  selSt = { stName: st.n, lineId: line.id };
  document.getElementById('dName').textContent = st.n + '駅';
  document.getElementById('dLine').textContent = line.full + ' ' + line.dir;
  document.getElementById('dPrice').textContent = st.p.toLocaleString();
  document.getElementById('dPrice').style.color = pc(st.p);
  document.getElementById('dRange').textContent = '目安 ' + st.r + '/坪';
  const det = document.getElementById('detail');
  det.classList.add('show');
  det.style.borderColor = line.color;
  drawMap();
}

function hideDetail() {
  selSt = null;
  document.getElementById('detail').classList.remove('show');
  drawMap();
}

document.getElementById('detailClose').addEventListener('click', hideDetail);

// ─── ヒットテスト ──────────────────────────────────────────────────────────
function hitTest(mx, my) {
  let best = null, bestD = 18;  // タップしやすいよう許容半径を広めに
  LINES.forEach(line => {
    line.st.filter(s => s.g && s.p <= budget).forEach(s => {
      const p = g2c(s.g[0], s.g[1]);
      const d = Math.hypot(p.x - mx, p.y - my);
      if (d < bestD) { bestD = d; best = { st: s, line }; }
    });
  });
  return best;
}

// ─── マウスイベント ────────────────────────────────────────────────────────
let drag = null;

canvas.addEventListener('mousedown', e => {
  drag = { x: e.offsetX, y: e.offsetY, cx: view.cx, cy: view.cy, moved: false };
});
canvas.addEventListener('mousemove', e => {
  if (drag) {
    const dx = e.offsetX - drag.x, dy = e.offsetY - drag.y;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) drag.moved = true;
    view.cx = drag.cx - dx / (BSX * view.zoom);
    view.cy = drag.cy + dy / (BSY * view.zoom);
    drawMap();
    return;
  }
  canvas.style.cursor = hitTest(e.offsetX, e.offsetY) ? 'pointer' : 'grab';
});
canvas.addEventListener('mouseup', e => {
  if (drag && !drag.moved) {
    const hit = hitTest(e.offsetX, e.offsetY);
    hit ? showDetail(hit.st, hit.line) : hideDetail();
  }
  drag = null;
});
canvas.addEventListener('mouseleave', () => { drag = null; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const geo = c2g(e.offsetX, e.offsetY);
  view.zoom = Math.max(0.4, Math.min(10, view.zoom * (e.deltaY < 0 ? 1.15 : 0.87)));
  view.cx = geo.lon - (e.offsetX - CW / 2) / (BSX * view.zoom);
  view.cy = geo.lat + (e.offsetY - CH / 2) / (BSY * view.zoom);
  drawMap();
}, { passive: false });

// タッチ
let ltDist = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    drag = {
      x: (t.clientX - rect.left) * (CW / rect.width),
      y: (t.clientY - rect.top) * (CH / rect.height),
      cx: view.cx, cy: view.cy, moved: false
    };
  } else if (e.touches.length === 2) {
    ltDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  if (e.touches.length === 1 && drag) {
    const t = e.touches[0];
    const cx = (t.clientX - rect.left) * (CW / rect.width);
    const cy = (t.clientY - rect.top) * (CH / rect.height);
    const dx = cx - drag.x, dy = cy - drag.y;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) drag.moved = true;
    view.cx = drag.cx - dx / (BSX * view.zoom);
    view.cy = drag.cy + dy / (BSY * view.zoom);
    drawMap();
  } else if (e.touches.length === 2 && ltDist) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    view.zoom = Math.max(0.4, Math.min(10, view.zoom * d / ltDist));
    ltDist = d;
    drawMap();
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (drag && !drag.moved && e.changedTouches.length === 1) {
    const rect = canvas.getBoundingClientRect();
    const t = e.changedTouches[0];
    const mx = (t.clientX - rect.left) * (CW / rect.width);
    const my = (t.clientY - rect.top) * (CH / rect.height);
    const hit = hitTest(mx, my);
    hit ? showDetail(hit.st, hit.line) : hideDetail();
  }
  drag = null; ltDist = null;
});

// ─── ボタン ────────────────────────────────────────────────────────────────
document.getElementById('zIn').addEventListener('click', () => {
  view.zoom = Math.min(10, view.zoom * 1.3); drawMap();
});
document.getElementById('zOut').addEventListener('click', () => {
  view.zoom = Math.max(0.4, view.zoom / 1.3); drawMap();
});
document.getElementById('zReset').addEventListener('click', () => {
  setInitialView(); drawMap();
});

// ─── ビュー切替 ────────────────────────────────────────────────────────────
document.getElementById('vMap').addEventListener('click', () => {
  if (curViewMode === 'map') return;
  curViewMode = 'map';
  document.getElementById('vMap').classList.add('active');
  document.getElementById('vChart').classList.remove('active');
  document.getElementById('canvasWrap').style.display = 'flex';
  document.getElementById('chartArea').style.display = 'none';
  resizeCanvas();
  drawMap();
});
document.getElementById('vChart').addEventListener('click', () => {
  if (curViewMode === 'chart') return;
  curViewMode = 'chart';
  document.getElementById('vChart').classList.add('active');
  document.getElementById('vMap').classList.remove('active');
  document.getElementById('canvasWrap').style.display = 'none';
  const ca = document.getElementById('chartArea');
  ca.style.display = 'flex';
  renderChart(curLine);
});

// ─── スライダー ─────────────────────────────────────────────────────────────
document.getElementById('bSlider').addEventListener('input', function () {
  budget = +this.value;
  document.getElementById('bLabel').textContent =
    budget >= 1500 ? '制限なし' : budget.toLocaleString() + ' 万円/坪以下';
  if (curViewMode === 'chart') renderChart(curLine);
  else drawMap();
  hideDetail();
});

// ─── 初期化 ────────────────────────────────────────────────────────────────
resizeCanvas();
setInitialView();
buildLineTabs();
buildLineLegend();
drawMap();

// 画面回転・リサイズ時にCanvasを再フィット
window.addEventListener('resize', () => {
  resizeCanvas();
  if (curViewMode === 'chart') renderChart(curLine);
  else drawMap();
});
</script>
</body>
